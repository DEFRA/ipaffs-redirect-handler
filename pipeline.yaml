trigger:
  branches:
    include:
      - '*'

pr:
  branches:
    exclude:
      - '*'
pool:
  name: 'DEFRA-COMMON-UBUNTU-SSV5'

resources:
  repositories:
    - repository: ipaffs-infra
      type: github
      endpoint: DEFRA
      name: DEFRA/ipaffs-infra
      ref: refs/heads/main

parameters:
  - name: environmentName
    displayName: Environment
    type: string
    values:
      - DEV
      - TST
      - PRE
      - PRD
    default: DEV

variables:
  - group: "${{ parameters.environmentName }}"
  - name: serviceName
    value: redirect-handler
  - name: nodeVersion
    value: 24.13.1
  - name: dockerFile
    value: Dockerfile

stages:
  - stage: BuildService
    displayName: Build Service
    jobs:
      - job: BuildNodeProject
        displayName: Build Node Project
        steps:
          - task: NodeTool@0
            inputs:
              versionSpec: ${{ variables.nodeVersion }}
              addToPath: true
            displayName: Install Node and NPM and add to path

          - script: npm  ci
            displayName: 'Install dependencies and build'

          - task: PublishPipelineArtifact@1
            inputs:
              artifact: 'service'
              targetPath: '$(Build.SourcesDirectory)/service_artifact'
            displayName: Install dependencies and build


  - stage: PackageService
    displayName: Package Service Image
    dependsOn:
      - BuildService
    jobs:
      - template: /pipelines/jobs/package-node-project.yaml@ipaffs-infra
        parameters:
          serviceName:  "${{ variables.serviceName }}"
          dockerFile: "${{ variables.dockerFile }}"



